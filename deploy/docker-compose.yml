# Production full-stack deploy (Oracle Cloud etc.): Postgres + Nest (serves SPA + API + WS) + Caddy (TLS).
# One public origin serves everything, WebSockets included.
#
#   cd deploy
#   cp .env.example .env            # set SITE_ADDRESS (your domain) + VITE_API_KEY
#   docker compose up -d --build
#
# Backend secrets are read from ../ecx-backend/.env (OPENROUTER_API_KEY, JWT_SECRET, etc.).
name: steward

services:
  postgres:
    image: postgres:16-alpine
    container_name: steward-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: steward
      POSTGRES_PASSWORD: steward
      POSTGRES_DB: steward
    volumes:
      - steward_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U steward -d steward']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        VITE_API_KEY: ${VITE_API_KEY:-dev-steward-key}
    container_name: steward-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../ecx-backend/.env
    environment:
      DATABASE_URL: postgresql://steward:steward@postgres:5432/steward?schema=public
      PORT: 3000
    expose:
      - '3000'

  caddy:
    image: caddy:2
    container_name: steward-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  steward_pgdata:
  caddy_data:
  caddy_config:

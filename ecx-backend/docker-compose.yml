# Local Postgres for development. `docker compose up -d` then `pnpm prisma migrate dev`.
services:
  postgres:
    image: postgres:16-alpine
    container_name: steward-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: steward
      POSTGRES_PASSWORD: steward
      POSTGRES_DB: steward
    ports:
      - '5544:5432'
    volumes:
      - steward_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U steward -d steward']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  steward_pgdata:

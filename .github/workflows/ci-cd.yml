name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecx-backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ecx-backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm build
      - run: pnpm test

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  image:
    name: Build & push image to GHCR
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase owner for GHCR
        id: meta
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push the full-stack image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/steward:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/steward:${{ github.sha }}
          # VITE_API_KEY is baked into the frontend bundle — set repo variable VITE_API_KEY = INTERNAL_API_KEY.
          build-args: |
            VITE_API_KEY=${{ vars.VITE_API_KEY || 'dev-steward-key' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Dokploy deploy
    needs: [image]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy redeploy (it re-pulls :latest)
        env:
          HOOK: ${{ secrets.DOKPLOY_DEPLOY_WEBHOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -fsSL --retry 3 -X POST "$HOOK"
          else
            echo "DOKPLOY_DEPLOY_WEBHOOK not set yet — skipping (deploy manually in Dokploy the first time)."
          fi
